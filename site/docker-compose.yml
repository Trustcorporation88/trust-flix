version: '3.8'

services:
  jetflix-site:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NEXT_PUBLIC_JETBOT_API=http://jetbot:3001
      - JWT_SECRET=dev-secret-change-this
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - jetbot

  jetbot:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../:/app
    command: npm start
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
